<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag Examples</title>
</head>

<body>

    <!-- Website Link -->
    <a href="https://www.google.com">
        Visit Google
    </a>

    <br><br>

    <!-- Open Email App -->
    <a href="mailto:abc@gmail.com">
        Send Email
    </a>

    <br><br>

    <!-- Email with Subject -->
    <a href="mailto:abc@gmail.com?subject=Hello">
        Send Email with Subject
    </a>

    <br><br>

    <!-- Email with Subject and Body -->
    <a href="mailto:abc@gmail.com?subject=Order&body=I want to order this product.">
        Send Order Email
    </a>

    <br><br>

    <!-- Open WhatsApp Chat -->
    <a href="https://wa.me/8801606074577">
        Chat on WhatsApp
    </a>

    <br><br>

    <!-- Make a Phone Call -->
    <a href="tel:+8801606074577">
        Call Now
    </a>

</body>

</html>
