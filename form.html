<input placeholder="Enter your password" type="password">

<input type="date" name="birthDate" id="birthDate">

<!-- form -->
<form>
  <label for="name">Name:</label>
  <input placeholder="Enter your name" type="text" id="name" name="name">
<br>
  <label for="email">Email:</label>
  <input placeholder="Enter your email" type="email" id="email" name="email">
<br>

  <select id="gender" name="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select>
<br>
  <label for="password">Password:</label>
  <input placeholder="Enter your password" type="password" id="password" name="password">
<br>

<label for="aboutMe">About Me:</label>
  <textarea id="aboutMe" name="aboutMe" rows="12" cols="50" placeholder="Tell us about yourself..."></textarea>
<br>

  <input type="submit" value="Submit">
</form>

<button type="button">Click Me</button>
